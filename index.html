<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NRP</title>
<meta name="theme-color" content="#15171A">
<link id="manifest-link" rel="manifest">
<link id="icon-link" rel="icon">
<style>
  :root{
    --bg:#F5F6F3; --fg:#1B1D1F; --accent:#B8752E; --accent-fg:#1B1D1F;
    --border:color-mix(in srgb, var(--fg) 14%, transparent);
    --muted:color-mix(in srgb, var(--fg) 58%, transparent);
    --raised:color-mix(in srgb, var(--fg) 5%, transparent);
    --danger:#B0402E;
    --fs-base:16px;
    --font-ui:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
    --font-read:Georgia,'Iowan Old Style','Palatino Linotype',serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:var(--font-ui); font-size:14px; line-height:1.5;
    -webkit-tap-highlight-color:transparent;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  button, input, select{ font-family:inherit; font-size:15px; color:inherit; }
  button{
    background:var(--raised); border:1px solid var(--border); color:var(--fg);
    padding:.7em 1em; cursor:pointer; border-radius:4px; font-weight:600;
    min-height:44px;
  }
  button:active{ transform:translateY(1px); }
  button.primary{ background:var(--accent); color:var(--accent-fg); border-color:var(--accent); font-weight:700; }
  button.icon{
    padding:.5em; min-width:44px; min-height:44px; font-size:1.5em; /* Increased size */
    display:inline-flex; align-items:center; justify-content:center;
  }
  button.chip{ padding:.4em .8em; min-height:auto; font-size:13px; font-weight:600; }
  input[type=text],input[type=password],input[type=number],input[type=url],select{
    width:100%; padding:.5em .6em; background:var(--bg); border:1px solid var(--border);
    border-radius:2px; color:var(--fg);
  }
  input[type=color]{ width:44px; height:32px; border:1px solid var(--border); background:none; padding:0; }
  label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:.9em 0 .3em; }
  fieldset{ border:1px solid var(--border); border-radius:3px; margin:1em 0; padding:.8em 1em 1.1em; }
  legend{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; padding:0 .4em; color:var(--muted); }
  hr{ border:none; border-top:1px solid var(--border); margin:.9em 0; }
  .row{ display:flex; gap:.6em; align-items:center; }
  .row.between{ justify-content:space-between; }
  .wrap{ flex-wrap:wrap; }
  .grow{ flex:1; min-width:0; }
  .hidden{ display:none !important; }
  .muted{ color:var(--muted); }
  .mono-num{ font-variant-numeric:tabular-nums; }
  .topbar{
    display:flex; align-items:center; gap:.4em; padding:.6em .6em;
    border-bottom:1px solid var(--border); background:var(--bg); flex:0 0 auto;
  }
  .topbar h1{ font-size:14px; margin:0; letter-spacing:.04em; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #top-actions{ display:flex; gap:.3em; flex-wrap:nowrap; }
  .screen{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .pad{ padding:1em; max-width:640px; margin:0 auto; }

  /* badge */
  .badge{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:2.4em; padding:.15em .4em; background:var(--accent); color:var(--accent-fg);
    font-family:var(--font-ui); font-weight:700; font-variant-numeric:tabular-nums;
    border-radius:2px; font-size:12px;
  }

  /* feed list */
  #refresh-indicator{ text-align:center; font-size:12px; color:var(--muted); padding:.4em; height:1.6em; }
  .feed-folder-header{
    display:flex; align-items:center; gap:.5em; padding:.7em .9em; min-height:44px;
    font-size:12px; text-transform:uppercase; letter-spacing:.07em; cursor:pointer;
    color:var(--muted); background:var(--raised); border-top:1px solid var(--border);
    border-bottom:1px solid var(--border); font-weight:700;
  }
  .feed-folder-header:active{ background:color-mix(in srgb, var(--fg) 8%, transparent); }
  .feed-folder-header .chevron{ display:inline-block; width:1em; font-size:11px; }
  .feed-folder-header .folder-name{ flex:0 0 auto; }
  .feed-folder-header .folder-count{ font-weight:400; text-transform:none; letter-spacing:0; }
  .feed-folder-header .grow{ flex:1; }
  .feed-folder-body.hidden{ display:none; }
  .feed-row{
    display:flex; align-items:center; gap:.7em; padding:1em .9em; border-bottom:1px solid var(--border);
    cursor:pointer; min-height:44px;
  }
  .feed-row:active{ background:var(--raised); }
  .feed-row .name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty{ padding:2.5em 1.4em; text-align:center; color:var(--muted); }
  .empty .big{ font-size:13px; font-family:var(--font-ui); letter-spacing:.04em; margin-bottom:.5em; }

  /* article list */
  .tabs{ display:flex; border-bottom:1px solid var(--border); }
  .tab{ flex:1; text-align:center; padding:1em 0; min-height:44px; background:none; border:none; border-radius:0; border-bottom:3px solid transparent; color:var(--muted); font-weight:600; }
  .tab.active{ color:var(--fg); border-bottom-color:var(--accent); }
  .art-row{ display:flex; gap:.7em; padding:.8em .9em; border-bottom:1px solid var(--border); cursor:pointer; }
  .art-row:active{ background:var(--raised); }
  .art-row.read{ opacity:.55; }
  .art-row .thumb{ flex:0 0 auto; width:56px; height:56px; object-fit:cover; border-radius:2px; border:1px solid var(--border); background:var(--raised); }
  .art-row .thumb.large{ width:96px; height:96px; }
  .art-row .body{ flex:1; min-width:0; }
  .art-row .title{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 0.94); font-weight:700; margin:0 0 .2em; }
  .art-row .preview{ font-size:calc(var(--fs-base) * 0.78); color:var(--muted); overflow:hidden; display:-webkit-box; -webkit-box-orient:vertical; }
  .art-row .meta{ font-size:calc(var(--fs-base) * 0.69); color:var(--muted); margin-top:.3em; }
  .art-row .star-dot{ color:var(--accent); margin-right:.3em; }

  /* article view */
  .art-head{ padding:1em 1.1em .6em; border-bottom:1px solid var(--border); }
  .art-head h2{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 1.375); line-height:1.25; margin:0 0 .3em; cursor:pointer; }
  .art-head .meta{ font-size:calc(var(--fs-base) * 0.75); color:var(--muted); }
  .art-enclosure{ max-width:100%; width:auto; height:auto; max-height:60vh; object-fit:contain; display:block; margin:0 auto; cursor:pointer; }
  .art-content{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 1.03); line-height:1.65; padding:1.1em 1.1em 3em; max-width:680px; margin:0 auto; }
  .art-content *{ float:none !important; }
  .art-content img{ display:block !important; float:none !important; max-width:100% !important; width:auto !important; height:auto !important; margin:0 0 .8em; cursor:pointer; border-radius:2px; }
  .art-content a{ color:var(--accent); }
  .art-content pre{ overflow-x:auto; background:var(--raised); padding:.7em; border-radius:2px; }

  /* config */
  .chk-list{ max-height:260px; overflow-y:auto; border:1px solid var(--border); border-radius:2px; }
  .chk-row{ display:flex; align-items:center; gap:.6em; padding:.5em .7em; border-bottom:1px solid var(--border); }
  .chk-row:last-child{ border-bottom:none; }
  .chk-row input{ width:auto; }
  .toast{
    position:fixed; left:50%; bottom:1.2em; transform:translateX(-50%);
    background:var(--fg); color:var(--bg); padding:.6em 1em; border-radius:3px;
    font-size:13px; z-index:50; max-width:88vw; text-align:center;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

  <div class="topbar">
    <button id="btn-back" class="icon hidden" aria-label="Back">&#8592;</button>
    <h1 id="top-title">NRP</h1>
    <span id="top-actions" class="row" style="gap:.4em;"></span>
    <button id="btn-config" class="icon" aria-label="Settings">&#9881;</button>
  </div>

  <!-- ===== CONFIG SCREEN ===== -->
  <section id="screen-config" class="screen hidden">
    <div class="pad">

      <fieldset>
        <legend>Miniflux</legend>
        <label for="cfg-mf-url">Server URL</label>
        <input id="cfg-mf-url" type="url" placeholder="https://miniflux.example.com">
        <label for="cfg-mf-token">API token</label>
        <input id="cfg-mf-token" type="password" placeholder="Miniflux API token">
        <label for="cfg-mf-max">Max items per feed / sync</label>
        <input id="cfg-mf-max" type="number" min="1" step="1" value="50">
        <div class="row" style="margin-top:.9em;">
          <button id="btn-manage-feeds" class="grow">Manage feeds&hellip;</button>
        </div>
        <div id="feed-picker" class="hidden" style="margin-top:.8em;">
          <div id="feed-picker-list" class="chk-list"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Organization</legend>
        <label for="cfg-folder-mode">Group feeds into folders</label>
        <select id="cfg-folder-mode">
          <option value="none">No folders (flat list)</option>
          <option value="manual">Manual folders</option>
          <option value="miniflux">Mirror Miniflux categories</option>
        </select>
        <div id="manual-folder-ui" class="hidden" style="margin-top:.8em;">
          <div class="row">
            <input id="new-folder-name" type="text" placeholder="New folder name" class="grow">
            <button id="btn-add-folder">Add</button>
          </div>
          <div id="folder-chip-list" class="row wrap" style="margin-top:.6em; gap:.4em;"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Wallabag</legend>
        <label for="cfg-wb-url">Base URL</label>
        <input id="cfg-wb-url" type="url" placeholder="https://wallabag.example.com">
        <label for="cfg-wb-client-id">Client ID</label>
        <input id="cfg-wb-client-id" type="text">
        <label for="cfg-wb-client-secret">Client secret</label>
        <input id="cfg-wb-client-secret" type="password">
        <label for="cfg-wb-username">Username</label>
        <input id="cfg-wb-username" type="text">
        <label for="cfg-wb-password">Password</label>
        <input id="cfg-wb-password" type="password">
      </fieldset>

      <fieldset>
        <legend>Images</legend>
        <div class="row between">
          <label style="margin:0;">Always show images</label>
          <input id="cfg-always-images" type="checkbox">
        </div>
        <label for="cfg-image-cache-mode">Image caching</label>
        <select id="cfg-image-cache-mode">
          <option value="all">Cache all images on sync</option>
          <option value="on-read">Cache images as read</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Appearance</legend>
        <div class="row">
          <div class="grow">
            <label for="cfg-light-bg">Light Background</label>
            <input id="cfg-light-bg" type="color">
          </div>
          <div class="grow">
            <label for="cfg-light-fg">Light Foreground</label>
            <input id="cfg-light-fg" type="color">
          </div>
        </div>
        <div class="row">
          <div class="grow">
            <label for="cfg-dark-bg">Dark Background</label>
            <input id="cfg-dark-bg" type="color">
          </div>
          <div class="grow">
            <label for="cfg-dark-fg">Dark Foreground</label>
            <input id="cfg-dark-fg" type="color">
          </div>
        </div>
        <label for="cfg-font-size">Reading font size &mdash; <span id="font-size-label">16px</span></label>
        <input id="cfg-font-size" type="range" min="12" max="26" step="1" value="16">
        <label for="cfg-density">Article list display</label>
        <select id="cfg-density">
          <option value="text">Text only</option>
          <option value="small">Text &amp; small image</option>
          <option value="large">Text &amp; large image</option>
        </select>
        <label for="cfg-preview-lines">Preview lines per article (incl. title)</label>
        <input id="cfg-preview-lines" type="number" min="2" max="10" value="3">
        <label for="cfg-startup-mode">Startup screen</label>
        <select id="cfg-startup-mode"></select>
      </fieldset>

      <fieldset>
        <legend>Cache & Config</legend>
        <label for="cfg-cache-size">Max image cache size</label>
        <select id="cfg-cache-size">
          <option value="104857600">100 MB</option>
          <option value="262144000">250 MB</option>
          <option value="536870912">500 MB</option>
          <option value="1073741824">1 GB</option>
          <option value="2147483648">2 GB</option>
          <option value="5368709120">5 GB</option>
        </select>
        <label for="cfg-max-item">Max size for a single cached item (MB)</label>
        <input id="cfg-max-item" type="number" min="1" max="50" value="2">
        <div class="row between wrap" style="margin-top:.9em; gap:.6em;">
          <span class="muted">Cached: <span id="cache-usage" class="mono-num">&mdash;</span></span>
          <button id="btn-clear-cache">Clear all cached data</button>
        </div>
        <div class="row" style="margin-top:1em; gap:.6em;">
          <button id="btn-import" class="grow">Import Config</button>
          <button id="btn-export" class="grow">Export Config</button>
        </div>
      </fieldset>

      <div class="row" style="margin:1.2em 0 2em;">
        <button id="btn-save-config" class="primary grow">Save configuration</button>
      </div>
    </div>
  </section>

  <!-- ===== FEED LIST SCREEN ===== -->
  <section id="screen-feeds" class="screen hidden">
    <div id="refresh-indicator"></div>
    <div class="row between" style="padding:.6em .9em;">
      <span class="muted">Sort</span>
      <span class="row" style="gap:.4em;">
        <select id="feed-sort-field">
          <option value="name">Name</option>
          <option value="count">Unread</option>
        </select>
        <button id="feed-sort-dir" class="icon">&#8595;</button>
      </span>
    </div>
    <div id="feed-list"></div>
  </section>

  <!-- ===== ARTICLE LIST SCREEN ===== -->
  <section id="screen-articles" class="screen hidden">
    <div class="tabs">
      <button class="tab" data-filter="unread">Unread</button>
      <button class="tab" data-filter="all">All</button>
      <button class="tab" data-filter="starred">Starred</button>
    </div>
    <div class="row between" style="padding:.5em .9em;">
      <span class="muted">Sort</span>
      <span class="row" style="gap:.4em;">
        <select id="art-sort-field">
          <option value="date">Date</option>
          <option value="size">Size</option>
        </select>
        <button id="art-sort-dir" class="icon">&#8595;</button>
      </span>
    </div>
    <div id="article-list"></div>
  </section>

  <!-- ===== ARTICLE VIEW SCREEN ===== -->
  <section id="screen-article" class="screen hidden">
    <img id="art-enclosure" class="art-enclosure hidden">
    <div class="art-head">
      <h2 id="art-title"></h2>
      <div class="meta">
        <span id="art-feedname"></span> &middot; <span id="art-date"></span>
      </div>
    </div>
    <div id="art-content" class="art-content"></div>
  </section>

  <div id="toast" class="toast"></div>

<script>
(function(){
"use strict";

/* ============================= CONFIG ============================= */
const CFG_KEY = "nrp_config";
const DEFAULT_CFG = {
  minifluxUrl:"", minifluxToken:"", minifluxMaxItems:50,
  wallabagUrl:"", wallabagClientId:"", wallabagClientSecret:"",
  wallabagUsername:"", wallabagPassword:"",
  wallabagAccessToken:null, wallabagRefreshToken:null, wallabagTokenExpiry:0,
  alwaysShowImages:true, imageCacheMode:"on-read",
  lightBg:"#F5F6F3", lightFg:"#1B1D1F",
  darkBg:"#15171A", darkFg:"#E7E4DA", accentColor:"#B8752E",
  startupMode:"feedlist",
  density:"small", previewLines:3, fontSize:16,
  cacheSizeLimit:536870912, maxItemSizeMB:2,
  folderMode:"none", folders:[],
  selectedFeeds:[]
};

function loadConfig(){
  try{
    const raw = localStorage.getItem(CFG_KEY);
    if(!raw) return Object.assign({}, DEFAULT_CFG);
    return Object.assign({}, DEFAULT_CFG, JSON.parse(raw));
  }catch(e){ return Object.assign({}, DEFAULT_CFG); }
}
function saveConfig(cfg){ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
let CFG = loadConfig();

function applyTheme(){
  const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
  const bg = isDark ? CFG.darkBg : CFG.lightBg;
  const fg = isDark ? CFG.darkFg : CFG.lightFg;
  document.documentElement.style.setProperty("--bg", bg);
  document.documentElement.style.setProperty("--fg", fg);
  document.documentElement.style.setProperty("--accent", CFG.accentColor || "#B8752E");
  document.documentElement.style.setProperty("--fs-base", (CFG.fontSize||16)+"px");
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", bg);
}

/* ============================= MANIFEST / ICON ============================= */
function buildIconDataUri(){
  const bg = CFG.accentColor || "#B8752E";
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
    <rect width="512" height="512" fill="${bg}"/>
    <text x="50%" y="55%" font-family="monospace" font-size="180" font-weight="700"
      fill="#141414" text-anchor="middle" dominant-baseline="middle">NRP</text>
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(svg);
}
function setupManifest(){
  const icon = buildIconDataUri();
  const manifest = {
    name:"NRP News Reader", short_name:"NRP",
    start_url:"./index.html", scope:"./",
    display:"standalone", background_color:CFG.lightBg, theme_color:CFG.lightBg,
    icons:[
      {src:icon, sizes:"192x192", type:"image/svg+xml", purpose:"any"},
      {src:icon, sizes:"512x512", type:"image/svg+xml", purpose:"any"}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  document.getElementById("manifest-link").href = URL.createObjectURL(blob);
  document.getElementById("icon-link").href = icon;
}

/* ============================= INDEXEDDB ============================= */
const DB_NAME = "nrp-db", DB_VERSION = 2; // Incremented version
let dbp = null;
function openDb(){
  if(dbp) return dbp;
  dbp = new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains("entries")){
        const s = db.createObjectStore("entries", {keyPath:"id"});
        s.createIndex("by_feed", "feedId");
        s.createIndex("by_starred", "starred");
      }
      if(!db.objectStoreNames.contains("assets")){
        db.createObjectStore("assets", {keyPath:"url"});
      }
      if(!db.objectStoreNames.contains("thumbnails")){ // Added store
        db.createObjectStore("thumbnails", {keyPath:"url"});
      }
      if(!db.objectStoreNames.contains("outbox")){
        db.createObjectStore("outbox", {keyPath:"seq", autoIncrement:true});
      }
      if(!db.objectStoreNames.contains("feedsCache")){
        db.createObjectStore("feedsCache", {keyPath:"id"});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return dbp;
}
async function tx(storeName, mode, fn){
  const db = await openDb();
  return new Promise((resolve, reject)=>{
    const t = db.transaction(storeName, mode);
    const store = t.objectStore(storeName);
    let result;
    Promise.resolve(fn(store)).then(r=>{ result = r; }).catch(reject);
    t.oncomplete = ()=>resolve(result);
    t.onerror = ()=>reject(t.error);
    t.onabort = ()=>reject(t.error);
  });
}
function reqp(req){
  return new Promise((resolve, reject)=>{
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbGetAll(storeName, indexName, query){
  const db = await openDb();
  const t = db.transaction(storeName, "readonly");
  const store = indexName ? t.objectStore(storeName).index(indexName) : t.objectStore(storeName);
  return reqp(store.getAll(query));
}

/* ---- entries ---- */
async function putEntries(list){
  return tx("entries", "readwrite", store=>{
    list.forEach(e=>store.put(e));
  });
}
async function getEntry(id){ return tx("entries","readonly", store=>reqp(store.get(id))); }
async function getEntriesByFeed(feedId){ return idbGetAll("entries","by_feed", feedId); }

/* ---- thumbnails ---- */
async function getThumbnail(url){ return tx("thumbnails","readonly", store=>reqp(store.get(url))); }
async function storeThumbnail(url, dataUri){
  return tx("thumbnails","readwrite", store=>store.put({url, dataUri}));
}

/* ---- assets (image cache) ---- */
async function getCachedAsset(url){ return tx("assets","readonly", store=>reqp(store.get(url))); }
async function storeAsset(url, blob){
  const maxBytes = CFG.maxItemSizeMB * 1024 * 1024;
  if(blob.size > maxBytes) throw new Error("item exceeds max cache item size");
  const rec = {url, blob, size:blob.size, lastAccessed:Date.now(), protectedFlag:false};
  await tx("assets","readwrite", store=>store.put(rec));
  return rec;
}
async function clearAllCachedData(){
  await tx("entries","readwrite", store=>store.clear());
  await tx("assets","readwrite", store=>store.clear());
  await tx("thumbnails","readwrite", store=>store.clear());
  objectUrlCache.clear();
}
function updateCacheUsageDisplay(){
  idbGetAll("assets").then(assets=>{
    const bytes = assets.reduce((s,a)=>s+(a.size||0), 0);
    $("#cache-usage").textContent = `Images: ${assets.length} (${(bytes/1048576).toFixed(1)} MB)`;
  });
}

const objectUrlCache = new Map();
async function resolveImageSrc(url){
  if(!url) return url;
  if(objectUrlCache.has(url)) return objectUrlCache.get(url);
  let rec = await getCachedAsset(url);
  if(rec && rec.blob){
    const obj = URL.createObjectURL(rec.blob);
    objectUrlCache.set(url, obj);
    return obj;
  }
  return url;
}

/* ============================= UI PLUMBING ============================= */
const $ = sel => document.querySelector(sel);
const screens = ["screen-config","screen-feeds","screen-articles","screen-article"];
let navStack = [];
let currentScreen = null;

function showScreen(id, opts){
  opts = opts || {};
  screens.forEach(s=>$("#"+s).classList.toggle("hidden", s!==id));
  currentScreen = id;
  $("#btn-back").classList.toggle("hidden", navStack.length===0);
  $("#top-title").textContent = opts.title || "NRP";
  $("#top-actions").innerHTML = "";
  (opts.actions||[]).forEach(a=>$("#top-actions").appendChild(a));
}
function navigate(id, opts){
  if(currentScreen) navStack.push({id:currentScreen, opts:lastOpts});
  lastOpts = opts;
  showScreen(id, opts);
}
let lastOpts = {};
$("#btn-back").addEventListener("click", ()=>{
  const prev = navStack.pop();
  if(prev){ lastOpts = prev.opts; showScreen(prev.id, prev.opts); }
});
$("#btn-config").addEventListener("click", ()=>{
  if(currentScreen !== "screen-config") navigate("screen-config", {title:"Settings"});
});

/* ============================= CONFIG LOGIC ============================= */
function populateConfigForm(){
  $("#cfg-mf-url").value = CFG.minifluxUrl;
  $("#cfg-mf-token").value = CFG.minifluxToken;
  $("#cfg-mf-max").value = CFG.minifluxMaxItems;
  $("#cfg-light-bg").value = CFG.lightBg;
  $("#cfg-light-fg").value = CFG.lightFg;
  $("#cfg-dark-bg").value = CFG.darkBg;
  $("#cfg-dark-fg").value = CFG.darkFg;
  $("#cfg-font-size").value = CFG.fontSize;
  $("#font-size-label").textContent = CFG.fontSize + "px";
  updateCacheUsageDisplay();
}

$("#btn-export").addEventListener("click", () => {
  const data = JSON.stringify(CFG);
  const blob = new Blob([data], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "nrp_config.json";
  a.click();
});

$("#btn-import").addEventListener("click", () => {
  const input = document.createElement("input");
  input.type = "file";
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = event => {
      try {
        CFG = Object.assign({}, DEFAULT_CFG, JSON.parse(event.target.result));
        saveConfig(CFG);
        populateConfigForm();
        applyTheme();
        toast("Config imported");
      } catch(err) { toast("Invalid config file"); }
    };
    reader.readAsText(file);
  };
  input.click();
});

async function renderArticleList(){
  // ... existing filtering/sorting logic ...
  const container = $("#article-list");
  container.innerHTML = "";
  
  for(const e of entries){
    const row = document.createElement("div");
    row.className = "art-row";
    // Thumbnail logic
    let thumbHtml = `<div class="thumb" id="thumb-${e.id}"></div>`;
    row.innerHTML = `...`; // omitted for brevity
    container.appendChild(row);

    // Generate/Fetch Thumbnail
    const imgUrl = e.enclosureUrl || firstImageUrl(e.content);
    if(imgUrl) {
      let thumb = await getThumbnail(imgUrl);
      if(!thumb) {
        const img = new Image();
        img.src = imgUrl;
        img.onload = async () => {
          const canvas = document.createElement("canvas");
          canvas.width = canvas.height = 96;
          canvas.getContext("2d").drawImage(img, 0, 0, 96, 96);
          const dataUri = canvas.toDataURL();
          await storeThumbnail(imgUrl, dataUri);
          $(`#thumb-${e.id}`).style.backgroundImage = `url(${dataUri})`;
        };
      } else {
        $(`#thumb-${e.id}`).style.backgroundImage = `url(${thumb.dataUri})`;
      }
    }
  }
}

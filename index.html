<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NRP</title>
<meta name="theme-color" content="#15171A">
<link id="manifest-link" rel="manifest">
<link id="icon-link" rel="icon">
<style>
  :root{
    --bg:#F5F6F3; --fg:#1B1D1F; --accent:#B8752E; --accent-fg:#1B1D1F;
    --border:color-mix(in srgb, var(--fg) 14%, transparent);
    --muted:color-mix(in srgb, var(--fg) 58%, transparent);
    --raised:color-mix(in srgb, var(--fg) 5%, transparent);
    --danger:#B0402E;
    --fs-base:16px;
    --font-ui:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
    --font-read:Georgia,'Iowan Old Style','Palatino Linotype',serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--fg);
    font-family:var(--font-ui); font-size:14px; line-height:1.5;
    -webkit-tap-highlight-color:transparent;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  button, input, select{ font-family:inherit; font-size:15px; color:inherit; }
  button{
    background:var(--raised); border:1px solid var(--border); color:var(--fg);
    padding:.7em 1em; cursor:pointer; border-radius:4px; font-weight:600;
    min-height:44px;
  }
  button:active{ transform:translateY(1px); }
  button.primary{ background:var(--accent); color:var(--accent-fg); border-color:var(--accent); font-weight:700; }
  button.icon{
    width:44px; height:44px; font-size:1.75em;
    display:inline-flex; align-items:center; justify-content:center; padding:0;
  }
  button.chip{ padding:.4em .8em; min-height:auto; font-size:13px; font-weight:600; }
  input[type=text],input[type=password],input[type=number],input[type=url],select{
    width:100%; padding:.5em .6em; background:var(--bg); border:1px solid var(--border);
    border-radius:2px; color:var(--fg);
  }
  input[type=color]{ width:44px; height:32px; border:1px solid var(--border); background:none; padding:0; }
  label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:.9em 0 .3em; }
  fieldset{ border:1px solid var(--border); border-radius:3px; margin:1em 0; padding:.8em 1em 1.1em; }
  legend{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; padding:0 .4em; color:var(--muted); }
  hr{ border:none; border-top:1px solid var(--border); margin:.9em 0; }
  .row{ display:flex; gap:.6em; align-items:center; }
  .row.between{ justify-content:space-between; }
  .wrap{ flex-wrap:wrap; }
  .grow{ flex:1; min-width:0; }
  .hidden{ display:none !important; }
  .muted{ color:var(--muted); }
  .mono-num{ font-variant-numeric:tabular-nums; }
  .topbar{
    display:flex; align-items:center; gap:.4em; padding:.6em .6em;
    border-bottom:1px solid var(--border); background:var(--bg); flex:0 0 auto;
  }
  .topbar h1{ font-size:14px; margin:0; letter-spacing:.04em; font-weight:600; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #top-actions{ display:flex; gap:.3em; flex-wrap:nowrap; }
  .screen{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .pad{ padding:1em; max-width:640px; margin:0 auto; }

  /* badge */
  .badge{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:2.4em; padding:.15em .4em; background:var(--accent); color:var(--accent-fg);
    font-family:var(--font-ui); font-weight:700; font-variant-numeric:tabular-nums;
    border-radius:2px; font-size:12px;
  }

  /* feed list */
  #refresh-indicator{ text-align:center; font-size:12px; color:var(--muted); padding:.4em; height:1.6em; }
  .feed-folder-header{
    display:flex; align-items:center; gap:.5em; padding:.7em .9em; min-height:44px;
    font-size:12px; text-transform:uppercase; letter-spacing:.07em; cursor:pointer;
    color:var(--muted); background:var(--raised); border-top:1px solid var(--border);
    border-bottom:1px solid var(--border); font-weight:700;
  }
  .feed-folder-header:active{ background:color-mix(in srgb, var(--fg) 8%, transparent); }
  .feed-folder-header .chevron{ display:inline-block; width:1em; font-size:11px; }
  .feed-folder-header .folder-name{ flex:0 0 auto; }
  .feed-folder-header .folder-count{ font-weight:400; text-transform:none; letter-spacing:0; }
  .feed-folder-header .grow{ flex:1; }
  .feed-folder-body.hidden{ display:none; }
  .feed-row{
    display:flex; align-items:center; gap:.7em; padding:1em .9em; border-bottom:1px solid var(--border);
    cursor:pointer; min-height:44px;
  }
  .feed-row:active{ background:var(--raised); }
  .feed-row .name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .empty{ padding:2.5em 1.4em; text-align:center; color:var(--muted); }
  .empty .big{ font-size:13px; font-family:var(--font-ui); letter-spacing:.04em; margin-bottom:.5em; }

  /* article list */
  .tabs{ display:flex; border-bottom:1px solid var(--border); }
  .tab{ flex:1; text-align:center; padding:1em 0; min-height:44px; background:none; border:none; border-radius:0; border-bottom:3px solid transparent; color:var(--muted); font-weight:600; }
  .tab.active{ color:var(--fg); border-bottom-color:var(--accent); }
  .art-row{ display:flex; gap:.7em; padding:.8em .9em; border-bottom:1px solid var(--border); cursor:pointer; }
  .art-row:active{ background:var(--raised); }
  .art-row.read{ opacity:.55; }
  .art-row .thumb{ flex:0 0 auto; width:56px; height:56px; object-fit:cover; border-radius:2px; border:1px solid var(--border); background:var(--raised); }
  .art-row .thumb.large{ width:96px; height:96px; }
  .art-row .body{ flex:1; min-width:0; }
  .art-row .title{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 0.94); font-weight:700; margin:0 0 .2em; }
  .art-row .preview{ font-size:calc(var(--fs-base) * 0.78); color:var(--muted); overflow:hidden; display:-webkit-box; -webkit-box-orient:vertical; }
  .art-row .meta{ font-size:calc(var(--fs-base) * 0.69); color:var(--muted); margin-top:.3em; }
  .art-row .star-dot{ color:var(--accent); margin-right:.3em; }

  /* article view */
  .art-head{ padding:1em 1.1em .6em; border-bottom:1px solid var(--border); }
  .art-head h2{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 1.375); line-height:1.25; margin:0 0 .3em; cursor:pointer; }
  .art-head .meta{ font-size:calc(var(--fs-base) * 0.75); color:var(--muted); }
  .art-enclosure{ max-width:100%; width:auto; height:auto; max-height:60vh; object-fit:contain; display:block; margin:0 auto; cursor:pointer; }
  .art-content{ font-family:var(--font-read); font-size:calc(var(--fs-base) * 1.03); line-height:1.65; padding:1.1em 1.1em 3em; max-width:680px; margin:0 auto; }
  .art-content *{ float:none !important; }
  .art-content img{ display:block !important; float:none !important; max-width:100% !important; width:auto !important; height:auto !important; margin:0 0 .8em; cursor:pointer; border-radius:2px; }
  .art-content a{ color:var(--accent); }
  .art-content pre{ overflow-x:auto; background:var(--raised); padding:.7em; border-radius:2px; }

  /* config */
  .chk-list{ max-height:260px; overflow-y:auto; border:1px solid var(--border); border-radius:2px; }
  .chk-row{ display:flex; align-items:center; gap:.6em; padding:.5em .7em; border-bottom:1px solid var(--border); }
  .chk-row:last-child{ border-bottom:none; }
  .chk-row input{ width:auto; }
  .toast{
    position:fixed; left:50%; bottom:1.2em; transform:translateX(-50%);
    background:var(--fg); color:var(--bg); padding:.6em 1em; border-radius:3px;
    font-size:13px; z-index:50; max-width:88vw; text-align:center;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>

  <div class="topbar">
    <button id="btn-back" class="icon hidden" aria-label="Back">&#128072;</button>
    <h1 id="top-title">NRP</h1>
    <span id="top-actions" class="row" style="gap:.4em;"></span>
    <button id="btn-config" class="icon" aria-label="Settings">&#9881;</button>
  </div>

  <!-- ===== CONFIG SCREEN ===== -->
  <section id="screen-config" class="screen hidden">
    <div class="pad">

      <fieldset>
        <legend>Miniflux</legend>
        <label for="cfg-mf-url">Server URL</label>
        <input id="cfg-mf-url" type="url" placeholder="https://miniflux.example.com">
        <label for="cfg-mf-token">API token</label>
        <input id="cfg-mf-token" type="password" placeholder="Miniflux API token">
        <label for="cfg-mf-max">Max items per feed / sync</label>
        <input id="cfg-mf-max" type="number" min="1" step="1" value="50">
        <div class="row" style="margin-top:.9em;">
          <button id="btn-manage-feeds" class="grow">Manage feeds&hellip;</button>
        </div>
        <div id="feed-picker" class="hidden" style="margin-top:.8em;">
          <div id="feed-picker-list" class="chk-list"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Organization</legend>
        <label for="cfg-folder-mode">Group feeds into folders</label>
        <select id="cfg-folder-mode">
          <option value="none">No folders (flat list)</option>
          <option value="manual">Manual folders</option>
          <option value="miniflux">Mirror Miniflux categories</option>
        </select>
        <div id="manual-folder-ui" class="hidden" style="margin-top:.8em;">
          <div class="row">
            <input id="new-folder-name" type="text" placeholder="New folder name" class="grow">
            <button id="btn-add-folder">Add</button>
          </div>
          <div id="folder-chip-list" class="row wrap" style="margin-top:.6em; gap:.4em;"></div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Wallabag</legend>
        <label for="cfg-wb-url">Base URL</label>
        <input id="cfg-wb-url" type="url" placeholder="https://wallabag.example.com">
        <label for="cfg-wb-client-id">Client ID</label>
        <input id="cfg-wb-client-id" type="text">
        <label for="cfg-wb-client-secret">Client secret</label>
        <input id="cfg-wb-client-secret" type="password">
        <label for="cfg-wb-username">Username</label>
        <input id="cfg-wb-username" type="text">
        <label for="cfg-wb-password">Password</label>
        <input id="cfg-wb-password" type="password">
      </fieldset>

      <fieldset>
        <legend>Images</legend>
        <div class="row between">
          <label style="margin:0;">Always show images</label>
          <input id="cfg-always-images" type="checkbox">
        </div>
        <label for="cfg-image-cache-mode">Image caching</label>
        <select id="cfg-image-cache-mode">
          <option value="all">Cache all images on sync</option>
          <option value="on-read">Cache images as read</option>
        </select>
      </fieldset>

      <fieldset>
        <legend>Appearance</legend>
        <label for="cfg-theme-mode">Theme Mode</label>
        <select id="cfg-theme-mode">
          <option value="system">System Default</option>
          <option value="light">Always Light</option>
          <option value="dark">Always Dark</option>
        </select>
        <div class="row" style="margin-bottom:.6em;">
          <button id="preset-defaults" class="grow chip">Reset to defaults</button>
        </div>
        <div class="row wrap" style="margin-bottom:.8em;">
          <div class="grow" style="min-width: 45%;">
            <label for="cfg-light-bg">Light Bg</label>
            <input id="cfg-light-bg" type="color">
          </div>
          <div class="grow" style="min-width: 45%;">
            <label for="cfg-light-fg">Light Fg</label>
            <input id="cfg-light-fg" type="color">
          </div>
          <div class="grow" style="min-width: 45%;">
            <label for="cfg-dark-bg">Dark Bg</label>
            <input id="cfg-dark-bg" type="color">
          </div>
          <div class="grow" style="min-width: 45%;">
            <label for="cfg-dark-fg">Dark Fg</label>
            <input id="cfg-dark-fg" type="color">
          </div>
        </div>
        <label for="cfg-font-size">Reading font size &mdash; <span id="font-size-label">16px</span></label>
        <input id="cfg-font-size" type="range" min="12" max="26" step="1" value="16">
        <label for="cfg-density">Article list display</label>
        <select id="cfg-density">
          <option value="text">Text only</option>
          <option value="small">Text &amp; small image</option>
          <option value="large">Text &amp; large image</option>
        </select>
        <label for="cfg-preview-lines">Preview lines per article (incl. title)</label>
        <input id="cfg-preview-lines" type="number" min="2" max="10" value="3">
        <label for="cfg-startup-mode">Startup screen</label>
        <select id="cfg-startup-mode"></select>
      </fieldset>

      <fieldset>
        <legend>Cache</legend>
        <label for="cfg-cache-size">Max image cache size</label>
        <select id="cfg-cache-size">
          <option value="104857600">100 MB</option>
          <option value="262144000">250 MB</option>
          <option value="536870912">500 MB</option>
          <option value="1073741824">1 GB</option>
          <option value="2147483648">2 GB</option>
          <option value="5368709120">5 GB</option>
        </select>
        <label for="cfg-max-item">Max size for a single cached item (MB)</label>
        <input id="cfg-max-item" type="number" min="1" max="50" value="2">
        <div class="row between wrap" style="margin-top:.9em; gap:.6em;">
          <span class="muted">Cached: <span id="cache-usage" class="mono-num">&mdash;</span></span>
          <button id="btn-clear-cache">Clear all cached data</button>
        </div>
        <p class="muted" style="font-size:11px; margin:.6em 0 0;">
          Clearing removes all cached articles, images, and pending sync actions,
          but keeps your selected feeds so the next sync starts fresh.
        </p>
      </fieldset>

      <fieldset>
        <legend>Data &amp; Configuration</legend>
        <div class="row wrap">
          <button id="btn-export-cfg" class="grow">Export Options</button>
          <button id="btn-import-cfg" class="grow">Import Options</button>
          <input type="file" id="file-import-cfg" class="hidden" accept=".json">
        </div>
      </fieldset>

      <div class="row" style="margin:1.2em 0 2em;">
        <button id="btn-save-config" class="primary grow">Save configuration</button>
      </div>
    </div>
  </section>

  <!-- ===== FEED LIST SCREEN ===== -->
  <section id="screen-feeds" class="screen hidden">
    <div id="refresh-indicator"></div>
    <div class="row between" style="padding:.6em .9em;">
      <span class="muted">Sort</span>
      <span class="row" style="gap:.4em;">
        <select id="feed-sort-field">
          <option value="name">Name</option>
          <option value="count">Unread</option>
        </select>
        <button id="feed-sort-dir" class="icon">&#8595;</button>
      </span>
    </div>
    <div id="feed-list"></div>
  </section>

  <!-- ===== ARTICLE LIST SCREEN ===== -->
  <section id="screen-articles" class="screen hidden">
    <div class="tabs">
      <button class="tab" data-filter="unread">Unread</button>
      <button class="tab" data-filter="all">All</button>
      <button class="tab" data-filter="starred">Starred</button>
    </div>
    <div class="row between" style="padding:.5em .9em;">
      <span class="muted">Sort</span>
      <span class="row" style="gap:.4em;">
        <select id="art-sort-field">
          <option value="date">Date</option>
          <option value="size">Size</option>
        </select>
        <button id="art-sort-dir" class="icon">&#8595;</button>
      </span>
    </div>
    <div id="article-list"></div>
  </section>

  <!-- ===== ARTICLE VIEW SCREEN ===== -->
  <section id="screen-article" class="screen hidden">
    <img id="art-enclosure" class="art-enclosure hidden">
    <div class="art-head">
      <h2 id="art-title"></h2>
      <div class="meta">
        <span id="art-feedname"></span> &middot; <span id="art-date"></span>
      </div>
    </div>
    <div id="art-content" class="art-content"></div>
  </section>

  <div id="toast" class="toast"></div>

<script>
(function(){
"use strict";

/* ============================= CONFIG ============================= */
const CFG_KEY = "nrp_config";
const DEFAULT_CFG = {
  minifluxUrl:"", minifluxToken:"", minifluxMaxItems:50,
  wallabagUrl:"", wallabagClientId:"", wallabagClientSecret:"",
  wallabagUsername:"", wallabagPassword:"",
  wallabagAccessToken:null, wallabagRefreshToken:null, wallabagTokenExpiry:0,
  alwaysShowImages:true, imageCacheMode:"on-read",
  themeMode:"system",
  lightBg:"#F5F6F3", lightFg:"#1B1D1F",
  darkBg:"#15171A", darkFg:"#E7E4DA",
  accentColor:"#B8752E",
  startupMode:"feedlist",
  density:"small", previewLines:3, fontSize:16,
  cacheSizeLimit:536870912, maxItemSizeMB:2,
  folderMode:"none", folders:[],
  selectedFeeds:[] // [{id,title,folderName}]
};

function loadConfig(){
  try{
    const raw = localStorage.getItem(CFG_KEY);
    if(!raw) return Object.assign({}, DEFAULT_CFG);
    let parsed = JSON.parse(raw);
    
    // Migration for older clients relying on single bg/fg
    if(parsed.bgColor && !parsed.lightBg) {
      parsed.lightBg = parsed.bgColor;
      parsed.lightFg = parsed.fgColor;
    }
    
    return Object.assign({}, DEFAULT_CFG, parsed);
  }catch(e){ return Object.assign({}, DEFAULT_CFG); }
}
function saveConfig(cfg){ localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); }
let CFG = loadConfig();

function applyTheme(){
  let isDark = CFG.themeMode === "dark";
  if (CFG.themeMode === "system") {
    isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  const bg = isDark ? CFG.darkBg : CFG.lightBg;
  const fg = isDark ? CFG.darkFg : CFG.lightFg;

  document.documentElement.style.setProperty("--bg", bg);
  document.documentElement.style.setProperty("--fg", fg);
  document.documentElement.style.setProperty("--accent", CFG.accentColor || "#B8752E");
  document.documentElement.style.setProperty("--fs-base", (CFG.fontSize||16)+"px");
  const meta = document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute("content", bg);
}

if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener("change", (e) => {
    if (CFG.themeMode === 'system') applyTheme();
  });
}


/* ============================= MANIFEST / ICON ============================= */
function buildIconDataUri(){
  const bg = CFG.accentColor || "#B8752E";
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
    <rect width="512" height="512" fill="${bg}"/>
    <text x="50%" y="55%" font-family="monospace" font-size="180" font-weight="700"
      fill="#141414" text-anchor="middle" dominant-baseline="middle">NRP</text>
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(svg);
}
function setupManifest(){
  const icon = buildIconDataUri();
  const manifest = {
    name:"NRP News Reader", short_name:"NRP",
    start_url:"./index.html", scope:"./",
    display:"standalone", background_color:CFG.lightBg, theme_color:CFG.lightBg,
    icons:[
      {src:icon, sizes:"192x192", type:"image/svg+xml", purpose:"any"},
      {src:icon, sizes:"512x512", type:"image/svg+xml", purpose:"any"}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  document.getElementById("manifest-link").href = URL.createObjectURL(blob);
  document.getElementById("icon-link").href = icon;
}

/* ============================= INDEXEDDB ============================= */
const DB_NAME = "nrp-db", DB_VERSION = 1;
let dbp = null;
function openDb(){
  if(dbp) return dbp;
  dbp = new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains("entries")){
        const s = db.createObjectStore("entries", {keyPath:"id"});
        s.createIndex("by_feed", "feedId");
        s.createIndex("by_starred", "starred");
      }
      if(!db.objectStoreNames.contains("assets")){
        db.createObjectStore("assets", {keyPath:"url"});
      }
      if(!db.objectStoreNames.contains("outbox")){
        db.createObjectStore("outbox", {keyPath:"seq", autoIncrement:true});
      }
      if(!db.objectStoreNames.contains("feedsCache")){
        db.createObjectStore("feedsCache", {keyPath:"id"});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return dbp;
}
async function tx(storeName, mode, fn){
  const db = await openDb();
  return new Promise((resolve, reject)=>{
    const t = db.transaction(storeName, mode);
    const store = t.objectStore(storeName);
    let result;
    Promise.resolve(fn(store)).then(r=>{ result = r; }).catch(reject);
    t.oncomplete = ()=>resolve(result);
    t.onerror = ()=>reject(t.error);
    t.onabort = ()=>reject(t.error);
  });
}
function reqp(req){
  return new Promise((resolve, reject)=>{
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbGetAll(storeName, indexName, query){
  const db = await openDb();
  const t = db.transaction(storeName, "readonly");
  const store = indexName ? t.objectStore(storeName).index(indexName) : t.objectStore(storeName);
  return reqp(store.getAll(query));
}

/* ---- entries ---- */
async function putEntries(list){
  return tx("entries", "readwrite", store=>{
    list.forEach(e=>store.put(e));
  });
}
async function getEntry(id){ return tx("entries","readonly", store=>reqp(store.get(id))); }
async function getEntriesByFeed(feedId){ return idbGetAll("entries","by_feed", feedId); }
async function getStarredEntries(){ return idbGetAll("entries","by_starred", true); }
async function deleteEntries(ids){
  return tx("entries","readwrite", store=>{ ids.forEach(id=>store.delete(id)); });
}

/* ---- assets (image cache) ---- */
async function cacheUsageBytes(){
  const all = await idbGetAll("assets");
  return all.reduce((sum,a)=>sum+(a.size||0), 0);
}
async function evictLru(neededBytes){
  let all = await idbGetAll("assets");
  all = all.filter(a=>!a.protectedFlag).sort((a,b)=>a.lastAccessed-b.lastAccessed);
  let used = (await idbGetAll("assets")).reduce((s,a)=>s+(a.size||0),0);
  let i = 0;
  while(used + neededBytes > CFG.cacheSizeLimit && i < all.length){
    const victim = all[i++];
    await tx("assets","readwrite", store=>store.delete(victim.url));
    used -= victim.size||0;
  }
}
async function getCachedAsset(url){ return tx("assets","readonly", store=>reqp(store.get(url))); }
async function storeAsset(url, blob){
  const maxBytes = CFG.maxItemSizeMB * 1024 * 1024;
  if(blob.size > maxBytes) throw new Error("item exceeds max cache item size");
  await evictLru(blob.size);
  const rec = {url, blob, size:blob.size, lastAccessed:Date.now(), protectedFlag:false};
  await tx("assets","readwrite", store=>store.put(rec));
  return rec;
}
async function touchAsset(url){
  await tx("assets","readwrite", store=>{
    const req = store.get(url);
    req.onsuccess = ()=>{
      const rec = req.result;
      if(rec){ rec.lastAccessed = Date.now(); store.put(rec); }
    };
  });
}
async function cacheStats(){
  const [assets, entries] = await Promise.all([idbGetAll("assets"), idbGetAll("entries")]);
  const bytes = assets.reduce((s,a)=>s+(a.size||0), 0);
  return {imageCount:assets.length, imageBytes:bytes, articleCount:entries.length};
}

/* Full reset: wipes every locally cached article, image, and pending sync
   action. Deliberately leaves CFG.selectedFeeds (and all other settings)
   untouched in localStorage, so the app looks exactly like it does right
   after picking feeds for the first time -- the next sync repopulates it. */
async function clearAllCachedData(){
  await tx("entries","readwrite", store=>store.clear());
  await tx("assets","readwrite", store=>store.clear());
  await tx("outbox","readwrite", store=>store.clear());
  await tx("feedsCache","readwrite", store=>store.clear());
  objectUrlCache.clear();
}

const objectUrlCache = new Map();

/* Thumbnail Generation */
async function generateThumbnailBlob(srcObjUrl, maxSize) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w <= maxSize && h <= maxSize) {
        resolve(null); // Signal that it's small enough to just use original
        return;
      }
      const scale = maxSize / Math.max(w, h); 
      const canvas = document.createElement('canvas');
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.8);
    };
    img.onerror = reject;
    img.src = srcObjUrl;
  });
}

async function resolveThumbnailSrc(url){
  if(!url) return url;
  const thumbKey = "thumb_" + url;
  if(objectUrlCache.has(thumbKey)) return objectUrlCache.get(thumbKey);

  let rec = await getCachedAsset(thumbKey);
  if(rec && rec.blob){
    touchAsset(thumbKey);
    const obj = URL.createObjectURL(rec.blob);
    objectUrlCache.set(thumbKey, obj);
    return obj;
  }

  const fullSrc = await resolveImageSrc(url);
  if (fullSrc === url) {
    return url;
  }
  
  try {
    const thumbBlob = await generateThumbnailBlob(fullSrc, 144);
    if (thumbBlob) {
      await storeAsset(thumbKey, thumbBlob);
      const obj = URL.createObjectURL(thumbBlob);
      objectUrlCache.set(thumbKey, obj);
      return obj;
    }
  } catch(e) { }

  return fullSrc;
}

/* Resolve an <img> src through the cache. Fetches original only on a cache
   miss or a failed cache write, per spec. */
async function resolveImageSrc(url){
  if(!url) return url;
  if(objectUrlCache.has(url)) return objectUrlCache.get(url);
  let rec = await getCachedAsset(url);
  if(rec && rec.blob){
    touchAsset(url);
    const obj = URL.createObjectURL(rec.blob);
    objectUrlCache.set(url, obj);
    return obj;
  }
  try{
    // Prefer a normal, readable fetch -- this is the only kind of response we
    // can verify actually succeeded and can safely both cache and display.
    const resp = await fetch(url, {referrerPolicy:"no-referrer"});
    if(resp.ok){
      const blob = await resp.blob();
      try{ await storeAsset(url, blob); }catch(storeErr){ }
      const obj = URL.createObjectURL(blob);
      objectUrlCache.set(url, obj);
      return obj;
    }
  }catch(e){ /* likely CORS-blocked -- fall through to opaque attempt */ }

  // Can't get a verifiable response (CORS-blocked). An opaque no-cors blob
  // can't be checked for success/failure, so showing it risks displaying a
  // broken image with no way to tell. Show the original URL directly
  // instead -- browsers can load cross-origin images without CORS, so this
  // reliably renders -- and try to warm the cache in the background without
  // it affecting what's on screen right now.
  cacheOpaqueInBackground(url);
  return url;
}

function cacheOpaqueInBackground(url){
  fetch(url, {mode:"no-cors", referrerPolicy:"no-referrer"})
    .then(resp=>resp.blob())
    .then(blob=>{ if(blob && blob.size>0) return storeAsset(url, blob).catch(()=>{}); })
    .catch(()=>{});
}

function extractImageUrls(html){
  if(!html) return [];
  const out = [];
  const re = /<img[^>]+src=["']([^"']+)["']/gi;
  let m;
  while((m = re.exec(html))) out.push(m[1]);
  return out;
}
async function prefetchImagesForEntry(entry){
  const urls = extractImageUrls(entry.content);
  if(entry.enclosureUrl) urls.push(entry.enclosureUrl);
  for(const url of urls){
    const existing = await getCachedAsset(url);
    if(existing) continue;
    try{
      const resp = await fetch(url, {referrerPolicy:"no-referrer"});
      if(resp.ok){
        const blob = await resp.blob();
        await storeAsset(url, blob).catch(()=>{});
        continue;
      }
    }catch(e){ }
    cacheOpaqueInBackground(url);
  }
}
async function setProtection(entry, protectedFlag){
  const urls = extractImageUrls(entry.content);
  if(entry.enclosureUrl) urls.push(entry.enclosureUrl);
  
  const allUrls = [];
  urls.forEach(u=>{ allUrls.push(u); allUrls.push("thumb_"+u); });

  for(const url of allUrls){
    await tx("assets","readwrite", store=>{
      const req = store.get(url);
      req.onsuccess = ()=>{
        const rec = req.result;
        if(!rec) return;
        if(protectedFlag){ rec.protectedFlag = true; store.put(rec); }
        else{
          idbGetAll("entries","by_starred", true).then(starred=>{
            let stillNeeded = false;
            for(const e of starred){
               if(e.id === entry.id) continue;
               const thisUrls = extractImageUrls(e.content);
               if(e.enclosureUrl) thisUrls.push(e.enclosureUrl);
               if(thisUrls.includes(url) || thisUrls.some(u=> "thumb_"+u === url)){
                  stillNeeded = true;
                  break;
               }
            }
            if(!stillNeeded){ 
               // only clear protection if no other starred entry still needs it
               rec.protectedFlag = false; store.put(rec); 
            }
          });
        }
      };
    });
  }
}
async function gcOrphanImages(){
  const [entries, assets] = await Promise.all([idbGetAll("entries"), idbGetAll("assets")]);
  const referenced = new Set();
  entries.forEach(e=>{
    extractImageUrls(e.content).forEach(u=>{ referenced.add(u); referenced.add("thumb_"+u); });
    if(e.enclosureUrl) { referenced.add(e.enclosureUrl); referenced.add("thumb_"+e.enclosureUrl); }
  });
  for(const a of assets){
    if(!a.protectedFlag && !referenced.has(a.url)){
      await tx("assets","readwrite", store=>store.delete(a.url));
    }
  }
}

async function enqueueOutbox(item){
  item.createdAt = Date.now();
  return tx("outbox","readwrite", store=>store.add(item));
}
async function processOutbox(){
  const items = await idbGetAll("outbox");
  items.sort((a,b)=>a.seq-b.seq);
  for(const item of items){
    try{
      if(item.type === "mark-status"){
        await mfMarkStatus(item.entryIds, item.status);
      }else if(item.type === "toggle-star"){
        await mfToggleBookmark(item.entryId);
      }else if(item.type === "wallabag-save"){
        await wbSaveEntry(item.title, item.content, item.url);
      }
      await tx("outbox","readwrite", store=>store.delete(item.seq));
    }catch(e){ break; }
  }
}

function mfBase(){ return (CFG.minifluxUrl||"").replace(/\/+$/,""); }
async function mfFetch(path, opts){
  opts = opts || {};
  const headers = Object.assign({"X-Auth-Token":CFG.minifluxToken}, opts.headers||{});
  if(opts.body) headers["Content-Type"] = "application/json";
  const resp = await fetch(mfBase()+path, Object.assign({}, opts, {headers}));
  if(!resp.ok) throw new Error("Miniflux "+resp.status+" "+path);
  if(resp.status === 204) return null;
  return resp.json();
}

}

/* ============================= WALLABAG API ============================= */
function wbBase(){ return (CFG.wallabagUrl||"").replace(/\/+$/,""); }
async function wbEnsureToken(){
  if(CFG.wallabagAccessToken && Date.now() < CFG.wallabagTokenExpiry - 30000) return CFG.wallabagAccessToken;
  const body = new URLSearchParams({
    grant_type:"password",
    client_id:CFG.wallabagClientId,
    client_secret:CFG.wallabagClientSecret,
    username:CFG.wallabagUsername,
    password:CFG.wallabagPassword
  });
  const resp = await fetch(wbBase()+"/oauth/v2/token", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
  if(!resp.ok) throw new Error("Wallabag auth failed "+resp.status);
  const data = await resp.json();
  CFG.wallabagAccessToken = data.access_token;
  CFG.wallabagRefreshToken = data.refresh_token;
  CFG.wallabagTokenExpiry = Date.now() + (data.expires_in||3600)*1000;
  saveConfig(CFG);
  return CFG.wallabagAccessToken;
}
async function wbSaveEntry(title, content, url){
  const token = await wbEnsureToken();
  const resp = await fetch(wbBase()+"/api/entries", {
    method:"POST",
    headers:{"Content-Type":"application/json", "Authorization":"Bearer "+token},
    body:JSON.stringify({url, title, content})
  });
  if(!resp.ok) throw new Error("Wallabag save failed "+resp.status);
  return resp.json();
}

/* ============================= HTML SANITIZE ============================= */
function sanitizeHtml(html){
  const doc = new DOMParser().parseFromString(html||"", "text/html");
  doc.querySelectorAll("script,style,iframe,object,embed,form").forEach(n=>n.remove());

  ["colgroup","col"].forEach(tag=>{
    doc.querySelectorAll(tag).forEach(el=>el.remove());
  });
  ["table","thead","tbody","tfoot","tr","td","th"].forEach(tag=>{
    doc.querySelectorAll(tag).forEach(el=>{
      const parent = el.parentNode;
      if(!parent) return;
      while(el.firstChild) parent.insertBefore(el.firstChild, el);
      parent.removeChild(el);
    });
  });

  doc.querySelectorAll("a").forEach(a=>{
    const isImageOnly = a.children.length===1 && a.firstElementChild.tagName==="IMG" && a.textContent.trim()==="";
    if(isImageOnly){
      const parent = a.parentNode;
      if(!parent) return;
      while(a.firstChild) parent.insertBefore(a.firstChild, a);
      parent.removeChild(a);
    }
  });

  doc.querySelectorAll("*").forEach(el=>{
    [...el.attributes].forEach(attr=>{
      const name = attr.name.toLowerCase();
      if(name.startsWith("on")) el.removeAttribute(attr.name);
      if((name==="href"||name==="src") && /^\s*javascript:/i.test(attr.value)) el.removeAttribute(attr.name);
      if(name==="style" || name==="align" || name==="valign") el.removeAttribute(attr.name);
    });
  });
  doc.querySelectorAll("img").forEach(img=>{
    img.removeAttribute("width");
    img.removeAttribute("height");
  });
  return doc.body.innerHTML;
}

  }else{
    saveConfig(CFG);
    applyTheme(); setupManifest();
  }
  toast("Configuration saved");
  goToFeedList();
});

async function removeFeed(feedId){
  const entries = await getEntriesByFeed(feedId);
  const toDelete = entries.filter(e=>!e.starred).map(e=>e.id);
  await deleteEntries(toDelete);
  await tx("feedsCache","readwrite", store=>store.delete(feedId));
  await gcOrphanImages();
}

/* ============================= SYNC ============================= */
async function syncFeed(feedId){
  const limit = CFG.minifluxMaxItems;
  const raw = await mfGetUnreadEntries(feedId, limit);
  const entries = (raw.entries||[]).map(e=>({
    id:e.id, feedId:e.feed_id, title:e.title, url:e.url,
    content: e.content, 
    contentSize: (e.content||"").length,
    publishedAt: e.published_at,
    status: e.status,
    starred: !!e.starred,
    enclosureUrl: (e.enclosures && e.enclosures[0]) ? e.enclosures[0].url : null,
    feedTitle: (e.feed && e.feed.title) || null
  }));
  for(const e of entries){
    const existing = await getEntry(e.id);
    if(existing){
      e.status = existing.status;
      e.starred = existing.starred;
    }
  }
  await putEntries(entries);
  if(CFG.imageCacheMode === "all"){
    for(const e of entries){ await prefetchImagesForEntry(e); }
  }
}
async function syncAllFeeds(){
  await processOutbox();
  for(const f of CFG.selectedFeeds){ await syncFeed(f.id).catch(()=>{}); }
  await refreshCounters();
}
async function refreshCounters(){
  try{
    const counters = await mfGetCounters();
    for(const f of CFG.selectedFeeds){
      const rec = {id:f.id, title:f.title, unreadCount:(counters.unreads && counters.unreads[f.id]) || 0};
      await tx("feedsCache","readwrite", store=>store.put(rec));
    }
  }catch(e){ }
}

/* ============================= FEED LIST SCREEN ============================= */
let feedSort = {field:"name", dir:"asc"};
const COLLAPSED_KEY = "nrp_collapsed_folders";
let collapsedFolders = loadCollapsedFolders();
function loadCollapsedFolders(){
  try{ return new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY)||"[]")); }
  catch(e){ return new Set(); }
}
function saveCollapsedFolders(){
  localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedFolders]));
}
async function goToFeedList(){
  navStack = []; lastOpts = {title:"Feeds"};
  showScreen("screen-feeds", {title:"Feeds"});
  await renderFeedList();
  refreshCounters().then(renderFeedList);
}
async function renderFeedList(){
  const cached = await idbGetAll("feedsCache");
  const byId = new Map(cached.map(c=>[c.id, c]));
  let rows = CFG.selectedFeeds.map(f=>({
    id:f.id, title:f.title, unread:(byId.get(f.id)||{}).unreadCount||0, folderName:f.folderName||null
  }));
  const container = $("#feed-list");
  container.innerHTML = "";
  if(rows.length===0){
    container.innerHTML = '<div class="empty"><div class="big">No feeds selected</div>Open Settings to choose feeds from your Miniflux instance.</div>';
    return;
  }
  const sortRows = arr => arr.sort((a,b)=>{
    let cmp = feedSort.field==="name" ? a.title.localeCompare(b.title) : a.unread-b.unread;
    return feedSort.dir==="asc" ? cmp : -cmp;
  });
  const renderRow = (r, target)=>{
    const div = document.createElement("div");
    div.className = "feed-row";
    div.innerHTML = `<span class="name">${escapeHtml(r.title)}</span><span class="badge mono-num">${r.unread}</span>`;
    div.addEventListener("click", ()=>openArticleList(r.id, r.title));
    (target||container).appendChild(div);
  };
  if(CFG.folderMode === "none"){
    sortRows(rows).forEach(r=>renderRow(r));
  }else{
    const groups = new Map();
    rows.forEach(r=>{
      const key = r.folderName || "Unfiled";
      if(!groups.has(key)) groups.set(key, []);
      groups.get(key).push(r);
    });
    const groupNames = [...groups.keys()].sort((a,b)=>{
      if(a==="Unfiled") return 1;
      if(b==="Unfiled") return -1;
      return a.localeCompare(b);
    });
    groupNames.forEach(name=>{
      const group = groups.get(name);
      const folderUnread = group.reduce((s,r)=>s+r.unread, 0);
      const isCollapsed = collapsedFolders.has(name);

      const header = document.createElement("div");
      header.className = "feed-folder-header";
      header.innerHTML = `
        <span class="chevron">${isCollapsed ? "\u25B8" : "\u25BE"}</span>
        <span class="folder-name">${escapeHtml(name)}</span>
        <span class="folder-count grow">${group.length} feed${group.length!==1?"s":""}</span>
        ${folderUnread>0 ? `<span class="badge mono-num">${folderUnread}</span>` : ""}
      `;

      const body = document.createElement("div");
      body.className = "feed-folder-body" + (isCollapsed ? " hidden" : "");
      sortRows(group).forEach(r=>renderRow(r, body));

      header.addEventListener("click", ()=>{
        const nowCollapsed = body.classList.toggle("hidden");
        header.querySelector(".chevron").textContent = nowCollapsed ? "\u25B8" : "\u25BE";
        if(nowCollapsed) collapsedFolders.add(name); else collapsedFolders.delete(name);
        saveCollapsedFolders();
      });

      container.appendChild(header);
      container.appendChild(body);
    });
  }
}
$("#feed-sort-field").addEventListener("change", e=>{ feedSort.field=e.target.value; renderFeedList(); });
$("#feed-sort-dir").addEventListener("click", ()=>{
  feedSort.dir = feedSort.dir==="asc" ? "desc" : "asc";
  $("#feed-sort-dir").textContent = feedSort.dir==="asc" ? "\u2193" : "\u2191";
  renderFeedList();
});

/* pull-to-refresh */
(function setupPullToRefresh(){
  const screen = $("#screen-feeds");
  const indicator = $("#refresh-indicator");
  let startY = null, pulling = false;
  screen.addEventListener("touchstart", e=>{
    if(screen.scrollTop <= 0){ startY = e.touches[0].clientY; pulling = true; }
  }, {passive:true});
  screen.addEventListener("touchmove", e=>{
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0) indicator.textContent = dy > 70 ? "Release to refresh" : "Pull to refresh";
  }, {passive:true});
  screen.addEventListener("touchend", async e=>{
    if(!pulling) return;
    pulling = false;
    const dy = (e.changedTouches[0].clientY - startY);
    if(dy > 70){
      indicator.textContent = "Refreshing\u2026";
      await syncAllFeeds();
      await renderFeedList();
    }
    indicator.textContent = "";
  });
})();

/* ============================= ARTICLE LIST SCREEN ============================= */
let currentFeed = null;
let articleFilter = "unread";
let artSort = {field:"date", dir:"desc"};
let lastArticleOrder = [];

function openArticleList(feedId, feedTitle){
  currentFeed = {id:feedId, title:feedTitle};
  navigate("screen-articles", {title:feedTitle});
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.filter===articleFilter));
  renderArticleList();
}
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click", ()=>{
    articleFilter = t.dataset.filter;
    document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t));
    renderArticleList();
  });
});
$("#art-sort-field").addEventListener("change", e=>{ artSort.field=e.target.value; renderArticleList(); });
$("#art-sort-dir").addEventListener("click", ()=>{
  artSort.dir = artSort.dir==="asc" ? "desc" : "asc";
  $("#art-sort-dir").textContent = artSort.dir==="asc" ? "\u2193" : "\u2191";
  renderArticleList();
});

async function renderArticleList(){
  let entries = await getEntriesByFeed(currentFeed.id);
  if(articleFilter==="unread") entries = entries.filter(e=>e.status==="unread");
  else if(articleFilter==="starred") entries = entries.filter(e=>e.starred);
  entries.sort((a,b)=>{
    let cmp = artSort.field==="date"
      ? new Date(a.publishedAt) - new Date(b.publishedAt)
      : a.contentSize - b.contentSize;
    return artSort.dir==="asc" ? cmp : -cmp;
  });
  lastArticleOrder = entries.map(e=>e.id);
  const container = $("#article-list");
  container.innerHTML = "";
  if(entries.length===0){
    container.innerHTML = '<div class="empty"><div class="big">Nothing here</div>Pull to refresh on the feed list to fetch new items.</div>';
    return;
  }
  for(const e of entries){
    const row = document.createElement("div");
    row.className = "art-row" + (e.status==="read" ? " read" : "");
    const previewText = stripTags(e.content).slice(0, 220);
    const linesCss = Math.max(1, CFG.previewLines-1);
    let thumbHtml = "";
    if(CFG.density !== "text" && (CFG.alwaysShowImages)){
      const imgUrl = e.enclosureUrl || firstImageUrl(e.content);
      if(imgUrl) thumbHtml = `<img class="thumb${CFG.density==='large'?' large':''}" data-src="${escapeAttr(imgUrl)}">`;
    }
    row.innerHTML = `
      ${thumbHtml}
      <div class="body">
        <div class="title">${e.starred?'<span class="star-dot">&#9733;</span>':''}${escapeHtml(e.title)}</div>
        <div class="preview" style="-webkit-line-clamp:${linesCss};">${escapeHtml(previewText)}</div>
        <div class="meta">${formatDate(e.publishedAt)} &middot; ${(e.contentSize/1024).toFixed(0)} KB</div>
      </div>`;
    row.addEventListener("click", ()=>openArticle(e.id));
    container.appendChild(row);
    const img = row.querySelector("img.thumb");
    if(img){
      resolveThumbnailSrc(img.dataset.src).then(src=>{ img.src = src; });
    }
  }
}
function firstImageUrl(html){ const u = extractImageUrls(html); return u[0]||null; }
function stripTags(html){
  const d = document.createElement("div"); d.innerHTML = html||""; return d.textContent||"";
}
function formatDate(iso){
  try{ return new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
  catch(e){ return ""; }
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============================= ARTICLE VIEW SCREEN ============================= */
let currentEntry = null;

function findLinkTarget(contentDiv, entry){
  const anchors = contentDiv.querySelectorAll("a");
  for(const a of anchors){
    if(a.textContent.trim().toLowerCase() === "[link]") return a.getAttribute("href");
  }
  return entry.enclosureUrl || null;
}

async function openArticle(entryId){
  const entry = await getEntry(entryId);
  if(!entry) return;
  currentEntry = entry;

  const starBtn = document.createElement("button");
  starBtn.className = "icon"; starBtn.setAttribute("aria-label","Star");
  starBtn.innerHTML = entry.starred ? "&#10084;" : "&#128420;";
  starBtn.addEventListener("click", ()=>toggleStar());

  const unreadBtn = document.createElement("button");
  unreadBtn.className = "icon"; unreadBtn.title = "Mark unread";
  unreadBtn.textContent = "\u{1F648}";
  unreadBtn.addEventListener("click", ()=>markUnread());

  const wbBtn = document.createElement("button");
  wbBtn.className = "icon"; wbBtn.title = "Send to Wallabag";
  wbBtn.textContent = "\u2708";
  wbBtn.addEventListener("click", ()=>sendToWallabag());

  const nextBtn = document.createElement("button");
  nextBtn.className = "icon"; nextBtn.title = "Next article";
  nextBtn.textContent = "\u{1F449}"; 
  nextBtn.addEventListener("click", ()=>nextArticle());

  navigate("screen-article", {title: entry.feedTitle||"Article", actions:[starBtn, unreadBtn, wbBtn, nextBtn]});
  
  // FIX BUG: Ensure the article scroll view begins from the very top when it opens
  $("#screen-article").scrollTop = 0; 

  $("#art-title").textContent = entry.title;
  $("#art-title").onclick = ()=>window.open(entry.url, "_blank", "noopener");
  $("#art-feedname").textContent = entry.feedTitle || "";
  $("#art-date").textContent = formatDate(entry.publishedAt);

  const contentDiv = $("#art-content");
  contentDiv.innerHTML = sanitizeHtml(entry.content) || "";
  const linkTarget = findLinkTarget(contentDiv, entry);

  const inlineImgs = contentDiv.querySelectorAll("img");
  const enc = $("#art-enclosure");
  if(inlineImgs.length > 0){
    enc.classList.add("hidden");
    for(const img of inlineImgs){
      const orig = img.getAttribute("src");
      img.addEventListener("click", ()=>{
        window.open(linkTarget || orig, "_blank", "noopener");
      });
      if(orig) resolveImageSrc(orig).then(src=>{ img.src = src; });
    }
  }else if(entry.enclosureUrl){
    enc.classList.remove("hidden");
    enc.onclick = ()=>window.open(linkTarget || entry.enclosureUrl, "_blank", "noopener");
    resolveImageSrc(entry.enclosureUrl).then(src=>{ enc.src = src; });
  }else{
    enc.classList.add("hidden");
  }

  if(CFG.imageCacheMode === "on-read"){ prefetchImagesForEntry(entry); }

  if(entry.status !== "read"){ await markRead(entry); }
}

function nextArticle(){
  if(!currentEntry || lastArticleOrder.length===0) return;
  const idx = lastArticleOrder.indexOf(currentEntry.id);
  if(idx === -1 || idx === lastArticleOrder.length-1){
    toast("No more articles in this list");
    return;
  }
  openArticle(lastArticleOrder[idx+1]);
}

async function markRead(entry){
  entry.status = "read";
  await putEntries([entry]);
  try{ await mfMarkStatus([entry.id], "read"); }
  catch(e){ await enqueueOutbox({type:"mark-status", entryIds:[entry.id], status:"read"}); }
}
async function markUnread(){
  if(!currentEntry) return;
  currentEntry.status = "unread";
  await putEntries([currentEntry]);
  try{ await mfMarkStatus([currentEntry.id], "unread"); }
  catch(e){ await enqueueOutbox({type:"mark-status", entryIds:[currentEntry.id], status:"unread"}); }
  toast("Marked unread");
}
async function toggleStar(){
  if(!currentEntry) return;
  currentEntry.starred = !currentEntry.starred;
  await putEntries([currentEntry]);
  await setProtection(currentEntry, currentEntry.starred);
  try{ await mfToggleBookmark(currentEntry.id); }
  catch(e){ await enqueueOutbox({type:"toggle-star", entryId:currentEntry.id}); }
  openArticle(currentEntry.id);
}
async function sendToWallabag(){
  if(!currentEntry) return;
  toast("Sending to Wallabag\u2026");
  try{
    await wbSaveEntry(currentEntry.title, currentEntry.content, currentEntry.url);
    toast("Saved to Wallabag");
  }catch(e){
    await enqueueOutbox({type:"wallabag-save", title:currentEntry.title, content:currentEntry.content, url:currentEntry.url});
    toast("Offline: queued for Wallabag");
  }
}

/* ============================= BOOT ============================= */
function isConfigured(){
  return !!(CFG.minifluxUrl && CFG.minifluxToken && CFG.selectedFeeds.length>0);
}
async function boot(){
  applyTheme();
  setupManifest();
  populateConfigForm();

  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }

  if(!isConfigured()){
    showScreen("screen-config", {title:"Settings"});
    return;
  }
  processOutbox();
  if(CFG.startupMode === "feedlist"){
    await goToFeedList();
  }else{
    const feed = CFG.selectedFeeds.find(f=>String(f.id)===String(CFG.startupMode));
    if(feed){
      navStack = []; lastOpts = {title:"Feeds"};
      showScreen("screen-feeds", {title:"Feeds"});
      await renderFeedList();
      openArticleList(feed.id, feed.title);
    }else{
      await goToFeedList();
    }
  }
  refreshCounters();
}
boot();

})();
</script>
